<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ====================== ✅ 标签页图标 ====================== -->
    <link rel="icon" href="https://github.com/Meng-shuo/Meng-shuo.github.io/raw/main/imgs/favicon.png" type="image/png">
    
    <title>Ms 的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: #333;
            line-height: 1.6;
        }

        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #e0e9f2;
            padding: 20px 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar .title {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 20px;
            background: #222;
            color: #fff;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .nav-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .nav-list li {
            margin: 5px 0;
        }

        .nav-list a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
            cursor: pointer;
        }

        .nav-list a:hover, .nav-list a.active {
            background: #f0f4f8;
        }

        .profile-card {
            background: #e0e9f2;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 10px;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 15px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
        }

        .tooltip {
            position: relative;
            cursor: default;
        }
        .tooltip:hover::after {
            content: attr(data-text);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
            z-index: 10;
        }

        .content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .post-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #222;
            text-align: center;
        }

        .post-meta {
            font-size: 1.1rem;
            color: #777;
            text-align: center;
        }

        .post-desc {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #444;
        }

        /* 正文内链接样式（和知乎一致，默认蓝色下划线） */
        .post-desc a {
            color: #0066cc;
            text-decoration: underline;
        }

        .btn-container {
            text-align: center;
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .read-more {
            display: inline-block;
            padding: 12px 24px;
            background: #222;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background 0.3s;
            cursor: pointer;
        }

        .read-more:hover {
            background: #444;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="title">Ms 的个人主页</div>
        <ul class="nav-list">
            <li><a data-page="home" class="nav-btn active">🏠 首页</a></li>
            <li><a data-page="about" class="nav-btn">👤 关于</a></li>
        </ul>

        <div class="profile-card">
            <div class="profile-avatar">
                <img src="https://github.com/Meng-shuo/Meng-shuo.github.io/blob/main/imgs/profile.png?raw=true" alt="头像">
        </div>
            <div class="profile-name">Meng Shuo</div>
            <div class="profile-stats">
                <div class="stat-item tooltip" data-text="E-mail->2418433006@qq.com">
                    <a href="https://mail.qq.com" target="_blank" style="text-decoration:none;color:inherit">
                        <div class="stat-label">E-mail</div>
                    </a>
                </div>
                <div class="stat-item tooltip" data-text="zhihu->https://www.zhihu.com/people/ai-mi-3-64-5">
                    <a href="https://www.zhihu.com/people/ai-mi-3-64-5" target="_blank" style="text-decoration:none;color:inherit">
                        <div class="stat-label">知乎</div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="page-home" class="page active">
            <div id="article-list"></div>
        </div>

        <div id="page-about" class="page">
            <div class="post-card">
                <h2 class="post-title">关于我</h2>
                <div class="post-desc" style="text-align:center">
                    Meng Shuo<br>
                    专业方向：导航、遥感、图像处理相关研究
                </div>
            </div>
        </div>

        <div id="page-article" class="page">
            <div class="post-card">
                <h2 class="post-title" id="detail-title"></h2>
                <div class="post-meta" id="detail-date"></div>
                <div class="post-desc" id="detail-content"></div>
                <div class="btn-container">
                    <div class="read-more" data-page="home">返回首页</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ==============================================
// 🔥 以后所有文章 只在这里改！复制粘贴即可
// ==============================================
const articles = [
    {
        id: 1,
        title: "本站介绍",
        date: "2026-04-11",
        intro: "A simple introduction for this web.",
        // 👇 点击阅读全文后显示的完整内容，直接在这里写
        content: `
            这是关于分析力学的一份讲义. 写这份讲义的目的是对费曼学习法的实践. 当然, 在巩固和深化理解的同时, 这份讲义也有一些新的结构和内容.<br><br>
            这份讲义与通常的分析力学讲义不同, 不从牛顿力学过渡到Lagrange力学再过渡到Hamilton力学, 而是从态矢量和相空间讲起, 给出分析力学的基本方法和思路. 随后直接讲解相空间中Hamilton力学的理论结构, 最后再过渡到位形空间的Lagrange力学. 在讲完Hamilton力学和Lagrange力学的基本框架之后, 再分别用这两套方法讨论对称性和守恒量的关系, 有助于对这两套语言进行对比, 并深入理解对称性与守恒量的关系. 最后, 利用分析力学的语言简单讲解中心力场, 微振动和刚体以及连续体系的分析力学. 通过这套讲法, 有助于建立起不局限于力学的现代的分析力学的理论框架, 并且采用假设-理论-实验验证的思路讲解, 可以很好地过渡到电动力学, 统计力学和量子力学.<br><br>
            这份讲义其实没有什么特定的受众, 因为主要动机是写给自己的. 但是, 这份讲义或许对想要提纲挈领地了解分析力学的读者有帮助: 理论内容完整, 但对于一些技术没有进行介绍(例如微扰法等内容), 换来了较短的篇幅. 内容更丰富的讲义推荐高显教老师的《经典力学》或者李岩松老师的《分析力学讲义》, 如果读者对分析力学中更深入的数学结构有兴趣, 推荐陈童老师的《经典力学新讲》. 陈童老师的讲义可以在他的网站上免费获取.<br><br>
            <strong>更新</strong><br>
            <ul>
                <li>2025.1.20: 第一版. 只包含理论部分. 后续会更新应用部分和数学附录.</li>
                <li>2025.3.1: 第二版. 更新了分析力学的应用章节和变分法的数学附录. 这份讲义的主要内容已经完成. 后期的更新将会是增添例子或者修改错误.
                    <ul>
                        <li>2025.3.5 更新: 修改了一些错误.</li>
                    </ul>
                </li>
            </ul><br>
            <strong>讲义链接</strong>: <a href="docs/A.M.LectNote.pdf" target="_blank">A.M.LectNote.pdf</a>
        `
    },
    {
        id: 2,
        title: "遥感图像处理实验",
        date: "2026-04-11",
        intro: "几何精校正、配准、融合等实验流程整理。",
        content: `
            本文记录遥感图像处理完整流程：<br>
            1. 几何精校正与GCP选取<br>
            2. 重采样方法对比（最近邻、双线性、三次卷积）<br>
            3. 融合效果评价<br><br>
            <strong>实验报告链接</strong>: <a href="docs/rs_process.pdf" target="_blank">遥感图像处理实验报告.pdf</a>
        `
    }
];

// 生成首页文章列表
const listEl = document.getElementById("article-list");
articles.forEach(art => {
    listEl.innerHTML += `
        <div class="post-card">
            <h2 class="post-title">${art.title}</h2>
            <div class="post-meta">${art.date}</div>
            <div class="post-desc">${art.intro}</div>
            <div class="btn-container">
                <div class="read-more" data-art-id="${art.id}">阅读全文</div>
            </div>
        </div>
    `;
});

// 切换页面
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-page="${pageId}"]`)?.classList.add('active');
    history.pushState({}, '', pageId === 'home' ? '/' : '/' + pageId);
}

// 打开文章详情
function showArticle(id) {
    const art = articles.find(a => a.id === id);
    document.getElementById('detail-title').innerText = art.title;
    document.getElementById('detail-date').innerText = art.date;
    document.getElementById('detail-content').innerHTML = art.content;

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-article').classList.add('active');
    history.pushState({}, '', '/article/' + id);
}

// 绑定所有按钮
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.page));
});

document.querySelectorAll('[data-art-id]').forEach(btn => {
    btn.addEventListener('click', () => showArticle(+btn.dataset.artId));
});

document.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.page));
});
</script>
</body>
</html>
