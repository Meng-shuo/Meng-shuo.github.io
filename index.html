<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms 的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: #333;
            line-height: 1.6;
        }

        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #e0e9f2;
            padding: 20px 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar .title {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 20px;
            background: #222;
            color: #fff;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .nav-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .nav-list li {
            margin: 5px 0;
        }

        .nav-list a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
            cursor: pointer;
        }

        .nav-list a:hover, .nav-list a.active {
            background: #f0f4f8;
        }

        .profile-card {
            background: #e0e9f2;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 10px;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 15px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
        }

        .tooltip {
            position: relative;
            cursor: default;
        }
        .tooltip:hover::after {
            content: attr(data-text);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
            z-index: 10;
        }

        .content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .post-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #222;
            text-align: center;
        }

        .post-meta {
            font-size: 1.1rem;
            color: #777;
            text-align: center;
        }

        .post-desc {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #444;
        }

        .btn-container {
            text-align: center;
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .read-more {
            display: inline-block;
            padding: 12px 24px;
            background: #222;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background 0.3s;
            cursor: pointer;
        }

        .read-more:hover {
            background: #444;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="title">Ms 的个人主页</div>
        <ul class="nav-list">
            <li><a data-page="home" class="nav-btn active">🏠 首页</a></li>
            <li><a data-page="about" class="nav-btn">👤 关于</a></li>
        </ul>

        <div class="profile-card">
            <div class="profile-avatar">
                <img src="https://github.com/Meng-shuo/Meng-shuo.github.io/blob/main/imgs/profile.png?raw=true" alt="头像">
            </div>
            <div class="profile-name">Meng Shuo</div>
            <div class="profile-stats">
                <div class="stat-item tooltip" data-text="E-mail->2418433006@qq.com">
                    <a href="https://mail.qq.com" target="_blank" style="text-decoration:none;color:inherit">
                        <div class="stat-label">E-mail</div>
                    </a>
                </div>
                <div class="stat-item tooltip" data-text="zhihu->https://www.zhihu.com/people/ai-mi-3-64-5">
                    <a href="https://www.zhihu.com/people/ai-mi-3-64-5" target="_blank" style="text-decoration:none;color:inherit">
                        <div class="stat-label">知乎</div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <!-- 首页 -->
        <div id="page-home" class="page active">
            <div id="article-list"></div>
        </div>

        <!-- 关于 -->
        <div id="page-about" class="page">
            <div class="post-card">
                <h2 class="post-title">关于我</h2>
                <div class="post-desc" style="text-align:center">
                     Meng Shuo<br>
                    专业方向：导航、遥感、图像处理相关研究<br>
                </div>
            </div>
        </div>

        <!-- 文章详情 -->
        <div id="page-article" class="page">
            <div class="post-card">
                <h2 class="post-title" id="detail-title"></h2>
                <div class="post-meta" id="detail-date"></div>
                <div class="post-desc" id="detail-content"></div>
                <div class="btn-container" id="detail-btns">
                </div>
                <div class="btn-container">
                    <div class="read-more" data-page="home">返回首页</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ==============================================
//  🔥 以后所有文章 只在这里加！复制粘贴即可
// ==============================================
const articles = [
    {
        id: 1,
        title: "本站介绍",
        date: "2026-04-11",
        intro: "A simple introduction for this web.",
        content: `
            这里是本站的完整介绍。<br><br>
            本网站用于展示个人学习与研究成果，包括导航、遥感图像处理、组合导航等方向的笔记与文档。
        `,
        // 想附加文章地址就写这里，不需要就删掉整行
        fileUrl: "docs/intro.pdf"
    },
    // ==========================================
    // 👇 新增第二篇，直接复制下面这一块
    // ==========================================
    {
        id: 2,
        title: "遥感图像处理实验",
        date: "2026-04-11",
        intro: "几何精校正、配准、融合等实验流程整理。",
        content: `
            本文记录遥感图像处理完整流程：<br>
            1. 几何精校正与GCP选取<br>
            2. 重采样方法对比（最近邻、双线性、三次卷积）<br>
            3. 融合效果评价
        `,
        fileUrl: "docs/rs_process.pdf"
    }
];

// 生成首页文章列表
const listEl = document.getElementById("article-list");
articles.forEach(art => {
    listEl.innerHTML += `
        <div class="post-card">
            <h2 class="post-title">${art.title}</h2>
            <div class="post-meta">${art.date}</div>
            <div class="post-desc">${art.intro}</div>
            <div class="btn-container">
                <div class="read-more" data-art-id="${art.id}">阅读全文</div>
            </div>
        </div>
    `;
});

// 切换页面
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-page="${pageId}"]`)?.classList.add('active');
    history.pushState({}, '', pageId === 'home' ? '/' : '/' + pageId);
}

// 打开文章详情
function showArticle(id) {
    const art = articles.find(a => a.id === id);
    document.getElementById('detail-title').innerText = art.title;
    document.getElementById('detail-date').innerText = art.date;
    document.getElementById('detail-content').innerHTML = art.content;

    let btns = '';
    if (art.fileUrl) {
        btns += `<a href="${art.fileUrl}" target="_blank" class="read-more">查看原文PDF</a>`;
    }
    document.getElementById('detail-btns').innerHTML = btns;

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-article').classList.add('active');
    history.pushState({}, '', '/article/' + id);
}

// 绑定所有按钮
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.page));
});

document.querySelectorAll('[data-art-id]').forEach(btn => {
    btn.addEventListener('click', () => showArticle(+btn.dataset.artId));
});

document.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.page));
});
</script>
</body>
</html>
