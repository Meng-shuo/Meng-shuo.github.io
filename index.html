<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms 个人主页</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 页面背景 */
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: #333;
            line-height: 1.6;
        }

        /* 主容器：侧边栏 + 主内容区 */
        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 280px;
            background: #e0e9f2;
            padding: 20px 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        /* 侧边栏标题 */
        .sidebar .title {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 20px;
            background: #222;
            color: #fff;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        /* 导航菜单 */
        .nav-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .nav-list li {
            margin: 5px 0;
        }

        .nav-list a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
            font-size: 1.1rem;
        }

        .nav-list a:hover, .nav-list a.active {
            background: #f0f4f8;
        }

        .nav-list .badge {
            margin-left: auto;
            background: #ddd;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #666;
        }

        /* 侧边栏个人信息卡片 */
        .profile-card {
            background: #e0e9f2;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 10px;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #666;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
        }

        /* 右侧主内容区：统一上下排布 */
        .content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 文章卡片：统一样式，避免冲突 */
        .post-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 文章标题 */
        .post-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #222;
            text-align: center;
        }

        /* 发布时间 */
        .post-meta {
            font-size: 1.1rem;
            color: #777;
            text-align: center;
        }

        /* 文章介绍 */
        .post-desc {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #444;
            text-align: left;
        }

        /* 阅读全文按钮容器：居中 */
        .btn-container {
            text-align: center;
            margin-top: 10px;
        }

        /* 按钮样式：统一复用 */
        .read-more {
            display: inline-block;
            padding: 12px 24px;
            background: #222;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .read-more:hover {
            background: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 左侧导航栏 -->
    <div class="sidebar">
        <div class="title">Ms 的个人主页</div>
        <ul class="nav-list">
            <li><a href="#" class="active">🏠 首页</a></li>
            <li><a href="#">👤 关于</a></li>
        </ul>

        <!-- 个人信息卡片 -->
                        <style>
                /* 小提示样式 */
                .tooltip {
                  position: relative;
                  cursor: default;
                }
                .tooltip:hover::after {
                  content: attr(data-text);
                  position: absolute;
                  bottom: 120%;
                  left: 50%;
                  transform: translateX(-50%);
                  background: #333;
                  color: #fff;
                  padding: 4px 10px;
                  border-radius: 4px;
                  font-size: 0.8rem;
                  white-space: nowrap;
                  z-index: 10;
                }
                </style>

                <div class="profile-stats">
                    <div class="stat-item tooltip" data-text="E-mail->2418433006@qq.com">
                        <div class="stat-label">E-mail</div>
                    </div>
                <div class="stat-item tooltip" data-text="https://www.zhihu.com/people/ai-mi-3-64-5">
                        <a href="https://www.zhihu.com/people/ai-mi-3-64-5" target="_blank" style="text-decoration:none; color:inherit;">
                            <div class="stat-label">知乎</div>
                        </a>
                 </div>
            </div>
        </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="content">
        <!-- ====================== 文章卡片模板 ======================
             复制这一整块，就能新增一篇文章
             只需要修改：标题、时间、介绍文字、PDF链接
        -->

        <!-- ====================== 文章卡片 1 ====================== -->
        <div class="post-card">
            <h2 class="post-title">本站介绍</h2>
            <div class="post-meta">2026-04-11</div>
            <div class="post-desc">
                A simple introduction to this web.
            </div>
            <div class="btn-container">
                <a href="docs/你的文件名.pdf" target="_blank" class="read-more">阅读全文</a>
            </div>
        </div>
        <!-- ====================== 卡片 1 结束 ====================== -->

    </div>
</div>

</body>
</html>
