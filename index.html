<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ms 的个人主页</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 页面背景 */
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: #333;
            line-height: 1.6;
        }

        /* 主容器：侧边栏 + 主内容区 */
        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 280px;
            background: #e0e9f2;
            padding: 20px 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        /* 侧边栏标题 */
        .sidebar .title {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 20px;
            background: #222;
            color: #fff;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        /* 导航菜单 */
        .nav-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .nav-list li {
            margin: 5px 0;
        }

        .nav-list a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #333;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .nav-list a:hover, .nav-list a.active {
            background: #f0f4f8;
        }

        .nav-list .badge {
            margin-left: auto;
            background: #ddd;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #666;
        }

        /* 侧边栏个人信息卡片 */
        .profile-card {
            background: #e0e9f2;
            border-radius: 4px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: 0 auto 10px;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 15px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #666;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
        }

        /* 鼠标悬浮提示样式 */
        .tooltip {
            position: relative;
            cursor: default;
        }
        .tooltip:hover::after {
            content: attr(data-text);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
            z-index: 10;
        }

        /* 右侧主内容区 */
        .content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 文章卡片 */
        .post-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #222;
            text-align: center;
        }

        .post-meta {
            font-size: 1.1rem;
            color: #777;
            text-align: center;
        }

        .post-desc {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #444;
            text-align: left;
        }

        .btn-container {
            text-align: center;
            margin-top: 10px;
        }

        .read-more {
            display: inline-block;
            padding: 12px 24px;
            background: #222;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background 0.3s;
            cursor: pointer;
        }

        .read-more:hover {
            background: #444;
        }

        /* 内容区域默认全部隐藏 */
        .page {
            display: none;
        }
        .page.active {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="title">Ms 的个人主页</div>
        <ul class="nav-list">
            <li><a data-href="/" class="active">🏠 首页</a></li>
            <li><a data-href="/about">👤 关于</a></li>
        </ul>

        <div class="profile-card">
            <div class="profile-avatar">
                <img src="https://github.com/Meng-shuo/Meng-shuo.github.io/blob/main/imgs/profile.png?raw=true" alt="头像">
            </div>
            <div class="profile-name">Meng Shuo</div>
            <div class="profile-stats">
                <div class="stat-item tooltip" data-text="E-mail->2418433006@qq.com">
                    <a href="https://mail.qq.com" target="_blank" style="text-decoration:none; color:inherit;">
                        <div class="stat-label">E-mail</div>
                    </a>
                </div>
                <div class="stat-item tooltip" data-text="zhihu->https://www.zhihu.com/people/ai-mi-3-64-5">
                    <a href="https://www.zhihu.com/people/ai-mi-3-64-5" target="_blank" style="text-decoration:none; color:inherit;">
                        <div class="stat-label">知乎</div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 内容区域 -->
    <div class="content">
        <!-- 首页 -->
        <div id="home" class="page active">
            <div class="post-card">
                <h2 class="post-title">本站介绍</h2>
                <div class="post-meta">2026-04-11</div>
                <div class="post-desc">
                    A simple introduction to this web.
                </div>
                <div class="btn-container">
                    <div class="read-more" data-href="/docs/intro">阅读全文</div>
                </div>
            </div>
        </div>

        <!-- 关于 -->
        <div id="about" class="page">
            <div class="post-card">
                <h2 class="post-title">关于我</h2>
                <div class="post-desc" style="text-align:center;">
                    这里是关于我的介绍<br>
                    你可以随便写任何内容
                </div>
            </div>
        </div>

        <!-- 阅读全文 -->
        <div id="docs-intro" class="page">
            <div class="post-card">
                <h2 class="post-title">本站介绍 - 全文</h2>
                <div class="post-desc">
                    这里是文章的完整内容<br>
                    你可以放任意长的文字
                </div>
                <div class="btn-container">
                    <div class="read-more" data-href="/home">返回首页</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 核心：点击切换页面 + 改网址不刷新
document.querySelectorAll('[data-href]').forEach(el => {
    el.addEventListener('click', () => {
        const path = el.getAttribute('data-href')
        history.pushState({}, '', path)

        // 切换内容
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
        if (path === '/') document.getElementById('home').classList.add('active')
        if (path === '/about') document.getElementById('about').classList.add('active')
        if (path === '/docs/intro') document.getElementById('docs-intro').classList.add('active')

        // 菜单高亮
        document.querySelectorAll('.nav-list a').forEach(a => a.classList.remove('active'))
        document.querySelector(`[data-href="${path}"]`)?.classList.add('active')
    })
})
</script>
</body>
</html>
